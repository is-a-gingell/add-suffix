name: Process Flow

on:
  workflow_dispatch:
    inputs:
      link:
        required: true
        type: string

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Setup
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg aria2 curl python3

      - name: Fetch
        run: |
          aria2c -x16 -s16 --file-allocation=none --max-tries=0 "${{ inputs.link }}" -o original.mp4

      - name: Process
        run: |
          RANDOM_COMMENT=$(cat /dev/urandom | tr -dc 'A-Za-z0-9!@#$%^&*()_+' | head -c 20)
          ffmpeg -i original.mp4 -c copy -metadata comment="$RANDOM_COMMENT" -movflags +faststart final.mp4

      - name: Serve
        shell: 'script -q -e -c "export TERM=xterm-256color CLICOLOR_FORCE=1; bash --noprofile --norc -eo pipefail {0}"'
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared

          python3 -m http.server 8080 > /dev/null 2>&1 &

          ./cloudflared tunnel --url http://localhost:8080 > tunnel.log 2>&1 &

          echo "Waiting for tunnel (up to 3 minutes)..."

          for i in {1..60}; do
            if grep -q "trycloudflare.com" tunnel.log; then
              TUNNEL_URL=$(grep -o 'https://[^ ]*\.trycloudflare\.com' tunnel.log | head -1)
              if [ -z "$TUNNEL_URL" ]; then
                TUNNEL_URL=$(grep -o 'https[^ ]*\.trycloudflare\.com' tunnel.log | head -1)
              fi

              if [ -n "$TUNNEL_URL" ]; then
                echo ""
                echo -e "\e[1;38;5;196m=== \e[1;38;5;202mFINAL \e[1;38;5;226mVIDEO \e[1;38;5;82mURL \e[1;38;5;21m===\e[0m"
                echo -e "\e[1;38;5;201m${TUNNEL_URL}/final.mp4\e[0m"
                echo -e "\e[1;38;5;196m=======================\e[0m"
                echo ""
                echo -e "\e[1;33mCopy the URL above and open it in a new tab.\e[0m"
                echo "Tunnel is running in background..."
                break
              fi
            fi
            sleep 3
          done

          if [ -z "${TUNNEL_URL:-}" ]; then
            echo "Failed to detect tunnel URL. Full log:"
            cat tunnel.log
            exit 1
          fi

          # Keep workflow alive without exiting
          sleep 3600
